worker_processes auto;
pid /tmp/nginx-devbox.pid;
error_log /tmp/nginx-devbox-error.log warn;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /tmp/nginx-devbox-access.log;

    client_body_temp_path /tmp/nginx-devbox/client-body;
    proxy_temp_path /tmp/nginx-devbox/proxy;
    fastcgi_temp_path /tmp/nginx-devbox/fastcgi;
    uwsgi_temp_path /tmp/nginx-devbox/uwsgi;
    scgi_temp_path /tmp/nginx-devbox/scgi;

    gzip on;

    # DevBox templates run as the devbox user; avoid distro defaults that may
    # listen on privileged ports or write to root-owned paths.
    include /home/devbox/project/*.conf;
}
